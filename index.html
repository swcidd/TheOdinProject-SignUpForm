<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Next PC | Get your next PC with Next PC</title>
  </head>
  <body>
    <div class="landing-page-main">
      <div id="title-card">
        <div id="title">
          <h1 id="website-header">NextPC</h1>
        </div>
      </div>
      <div id="form-section">
        <div id="tooltip">
          <p>
            We build custom gaming PCs on a budget! Free delivery within Iloilo
            City. Shipping nationwide.
          </p>
          <p>Sign-Up to start shopping with Next PC</p>
        </div>
        <div id="input-fields">
          <form>
            <div id="row-1">
              <label for="first_name">FIRST NAME</label>
              <label for="first_name">LAST NAME</label>
            </div>
            <div id="row-2">
              <label for="first_name">EMAIL</label>
              <label for="first_name">PHONE NUMBER</label>
            </div>
            <div id="row-3">
              <label for="first_name">PASSWORD</label>
              <label for="first_name">CONFIRM PASSWORD</label>
            </div>
          </form>
        </div>
        <div id="create-account-button">
          <button>Create Account</button>
        </div>
        <div id="go-to-login">
          <p>Already have an account?</p>
          <a href="https://www.facebook.com/nextpciloilo">Log In</a>
        </div>
      </div>
    </div>
  </body>
</html>
